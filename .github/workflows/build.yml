name: Build

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      mods: ${{ steps.list.outputs.mods }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          mods=$(find . -mindepth 2 -maxdepth 2 -name compile.hxml -exec dirname {} \; \
            | xargs -n1 basename | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "mods=$mods" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    strategy:
      matrix:
        mod: ${{ fromJSON(needs.discover.outputs.mods) }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      mod: ${{ matrix.mod }}
    secrets: inherit
